<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>News Agent</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --col-links:       #c0392b;
      --col-mitte-links: #e67e22;
      --col-mitte:       #d4ac0d;
      --col-mitte-rechts:#2980b9;
      --col-rechts:      #1a3a5c;
      --col-oerr:        #27ae60;
      --col-agentur:     #7f8c8d;
    }

    body { background: #f4f6f9; }

    .navbar-brand { font-weight: 700; letter-spacing: .5px; }

    .topic-card {
      border: none;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      transition: box-shadow .2s;
    }
    .topic-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.14); }

    .spectrum-bar { min-height: 22px; }
    .spec-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: .68rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: .3px;
      text-shadow: 0 1px 2px rgba(0,0,0,.3);
    }
    .spec-links        { background: var(--col-links); }
    .spec-mitte-links  { background: var(--col-mitte-links); }
    .spec-mitte        { background: var(--col-mitte); color: #333; text-shadow: none; }
    .spec-mitte-rechts { background: var(--col-mitte-rechts); }
    .spec-rechts       { background: var(--col-rechts); }
    .spec-oerr         { background: var(--col-oerr); }
    .spec-agentur      { background: var(--col-agentur); }

    .card-title { font-size: .9rem; line-height: 1.35; }

    .toggle-btn { font-size: .78rem; }

    .detail-section { border-top: 1px solid #e9ecef; }
    .faktenkern-text { font-size: .85rem; line-height: 1.6; color: #333; }

    .framing-item {
      font-size: .82rem;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .framing-item:last-child { border-bottom: none; }
    .framing-quelle { font-weight: 600; min-width: 130px; }

    .wort-konzept { font-size: .8rem; font-weight: 600; color: #555; margin-top: 6px; }
    .wort-var     { font-size: .78rem; padding: 2px 0; }
    .wort-quelle  { font-weight: 600; min-width: 110px; display: inline-block; }

    .article-links { font-size: .75rem; }
    .article-links a { color: #888; text-decoration: none; margin-right: 8px; }
    .article-links a:hover { text-decoration: underline; }

    .stats-bar { font-size: .82rem; color: #888; }

    .spinner-overlay {
      display: flex; align-items: center; justify-content: center;
      padding: 40px 0; color: #aaa;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark sticky-top">
  <div class="container-xl d-flex align-items-center gap-3 flex-wrap py-2">
    <span class="navbar-brand mb-0">📰 News Agent</span>
    <div class="d-flex gap-2 ms-auto flex-wrap">
      <select id="filter-date" class="form-select form-select-sm" style="width:auto">
        <option value="">Alle Daten</option>
      </select>
      <select id="filter-label" class="form-select form-select-sm" style="width:auto">
        <option value="">Alle Spektren</option>
        <option value="links">Links</option>
        <option value="mitte-links">Mitte-Links</option>
        <option value="mitte">Mitte</option>
        <option value="mitte-rechts">Mitte-Rechts</option>
        <option value="rechts">Rechts</option>
        <option value="öRR">öRR</option>
        <option value="Agentur">Agentur</option>
      </select>
    </div>
  </div>
</nav>

<div class="container-xl py-4">
  <div id="stats-bar" class="stats-bar mb-3"></div>
  <div id="spinner" class="spinner-overlay">
    <div class="spinner-border spinner-border-sm me-2" role="status"></div> Lade Themen…
  </div>
  <p id="no-results" class="text-muted text-center py-5" style="display:none">
    Keine Themen für diese Auswahl.
  </p>
  <div id="topics-grid" class="row g-3"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
