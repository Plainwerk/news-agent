<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkeptiKA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg:           #f8f9fa;
      --card-bg:      #ffffff;
      --headline:     #1a1a2e;
      --accent:       #e63946;
      --accent-blue:  #1a73e8;
      --muted:        #6b7280;
      --border:       #e5e7eb;
      --faktenkern-bg:#e8f4f8;
      --faktenkern-bd:#1a73e8;

      /* spectrum */
      --links:        #e63946;
      --mitte-links:  #f4845f;
      --mitte:        #adb5bd;
      --mitte-rechts: #5b9bd5;
      --rechts:       #1a3a5c;
      --oerr:         #27ae60;
      --agentur:      #9ca3af;
      --seg-off:      #e9ecef;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: #111827;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Navbar ────────────────────────────────────────────── */
    .site-nav {
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0.75rem 0;
    }
    .brand {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--headline);
      letter-spacing: -0.5px;
      text-decoration: none;
      white-space: nowrap;
    }
    .brand span { color: var(--accent); }

    .filter-pills {
      display: flex;
      gap: 0.375rem;
      flex-wrap: wrap;
    }
    .pill {
      padding: 0.3rem 0.875rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s ease;
      line-height: 1.4;
    }
    .pill:hover   { border-color: var(--headline); color: var(--headline); }
    .pill.active  { background: var(--headline); color: #fff; border-color: var(--headline); }

    .date-select {
      font-size: 0.78rem;
      font-weight: 500;
      border-color: var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 0.3rem 0.75rem;
    }
    .date-select:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(26,115,232,.12); }

    /* ── Main layout ───────────────────────────────────────── */
    .main-wrap { padding: 2rem 0 4rem; }

    .stats-bar {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .spinner-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5rem 0;
      color: var(--muted);
      font-size: 0.875rem;
      gap: 0.5rem;
    }

    /* ── Spectrum bar ──────────────────────────────────────── */
    .spectrum-bar-wrap { margin-bottom: 0.5rem; }
    .spectrum-bar {
      display: flex;
      gap: 2px;
      overflow: hidden;
    }
    .spectrum-seg { flex: 1; transition: opacity .2s; }
    .spectrum-axis {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }
    .spectrum-axis-label {
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .2px;
    }
    .spec-extras { display: flex; gap: 4px; }
    .spec-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .spec-dot-oerr    { background: var(--oerr); }
    .spec-dot-agentur { background: var(--agentur); }

    /* ── Spectrum badges (framing table) ───────────────────── */
    .spec-badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,.25);
      vertical-align: middle;
    }
    .spec-links        { background: var(--links); }
    .spec-mitte-links  { background: var(--mitte-links); }
    .spec-mitte        { background: var(--mitte); color: #333; text-shadow: none; }
    .spec-mitte-rechts { background: var(--mitte-rechts); }
    .spec-rechts       { background: var(--rechts); }
    .spec-oerr         { background: var(--oerr); }
    .spec-agentur      { background: var(--agentur); color: #333; text-shadow: none; }

    /* ── Hero ──────────────────────────────────────────────── */
    .hero-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 2rem 2.25rem;
      box-shadow: 0 2px 16px rgba(0,0,0,.07);
      border: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }
    .hero-eyebrow {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .hero-title {
      font-size: 2rem;
      font-weight: 800;
      color: var(--headline);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 1.25rem;
    }
    .hero-faktenkern {
      font-size: 0.95rem;
      line-height: 1.75;
      color: #374151;
      margin: 1rem 0 1.25rem;
      font-style: italic;
    }
    .hero-meta {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 500;
    }
    .btn-hero-detail {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--accent-blue);
      background: none;
      border: 1.5px solid var(--accent-blue);
      border-radius: 8px;
      padding: 0.45rem 1.1rem;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-hero-detail:hover {
      background: var(--accent-blue);
      color: #fff;
    }

    /* ── Cards ─────────────────────────────────────────────── */
    .topic-card {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      overflow: hidden;
      transition: box-shadow .2s, transform .2s;
    }
    .topic-card:hover {
      box-shadow: inset 4px 0 0 var(--accent-blue), 0 8px 28px rgba(0,0,0,.09);
      transform: translateY(-2px);
    }
    .card-inner { padding: 1.125rem 1.25rem 0.75rem; }
    .card-title-text {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--headline);
      line-height: 1.4;
      margin-bottom: 0.875rem;
    }
    .card-meta {
      font-size: 0.73rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }
    .has-framing { color: #059669; font-weight: 600; }

    .toggle-btn {
      display: block;
      width: 100%;
      text-align: left;
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--accent-blue);
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      padding: 0.6rem 1.25rem;
      cursor: pointer;
      transition: color .15s, background .15s;
    }
    .toggle-btn:hover { background: #f0f7ff; color: var(--headline); }

    /* ── Detail area ───────────────────────────────────────── */
    .detail-body {
      border-top: 1px solid var(--border);
      padding: 1.25rem;
      background: #fafbfc;
    }
    .detail-section-label {
      font-size: 0.63rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .faktenkern-box {
      background: var(--faktenkern-bg);
      border-left: 3px solid var(--faktenkern-bd);
      padding: 0.875rem 1rem 0.875rem 1.1rem;
      border-radius: 0 8px 8px 0;
      font-size: 0.88rem;
      line-height: 1.75;
      color: #1f2937;
      margin-bottom: 1.25rem;
    }

    .framing-table {
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 1.25rem;
    }
    .framing-row {
      display: grid;
      grid-template-columns: 180px 1fr;
    }
    .framing-row:nth-child(even) { background: #f8f9fa; }
    .framing-row:nth-child(odd)  { background: #fff; }
    .framing-cell {
      padding: 0.6rem 0.875rem;
      font-size: 0.82rem;
      line-height: 1.5;
    }
    .framing-source {
      font-weight: 600;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 5px;
      flex-wrap: wrap;
    }

    .wort-konzept {
      font-size: 0.76rem;
      font-weight: 600;
      color: #374151;
      margin-top: 0.5rem;
      margin-bottom: 0.25rem;
    }
    .wort-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.3rem 0.75rem;
      margin-bottom: 0.5rem;
    }
    .wort-item { font-size: 0.78rem; }
    .wort-source { font-weight: 600; color: #374151; }
    .wort-term { color: var(--muted); }

    .source-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin-top: 1rem;
      padding-top: 0.875rem;
      border-top: 1px solid var(--border);
    }
    .source-chip {
      font-size: 0.71rem;
      font-weight: 500;
      padding: 0.25rem 0.625rem;
      border-radius: 20px;
      background: #f3f4f6;
      color: #374151;
      text-decoration: none;
      border: 1px solid var(--border);
      transition: background .12s;
    }
    .source-chip:hover { background: #e5e7eb; color: var(--headline); }

    .spinner-mini {
      font-size: 0.8rem;
      color: var(--muted);
      padding: 1rem 0;
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 576px) {
      .hero-title { font-size: 1.4rem; }
      .hero-card  { padding: 1.25rem; }
      .framing-row { grid-template-columns: 1fr; }
      .framing-source { border-right: none; border-bottom: 1px solid var(--border); }
      .wort-grid  { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <div class="container-xl">
    <div class="d-flex align-items-center gap-3 flex-wrap">
      <a class="brand" href="/">Skepti<span>KA</span></a>
      <div class="filter-pills">
        <button class="pill active" data-cat="Alle">Alle</button>
        <button class="pill" data-cat="Politik">Politik</button>
        <button class="pill" data-cat="Wirtschaft">Wirtschaft</button>
        <button class="pill" data-cat="Gesellschaft">Gesellschaft</button>
      </div>
      <div class="ms-auto">
        <select id="filter-date" class="date-select form-select">
          <option value="">Heute</option>
        </select>
      </div>
    </div>
  </div>
</nav>

<div class="container-xl main-wrap">
  <div id="hero-section" style="display:none"></div>
  <div id="spinner" class="spinner-wrap">
    <div class="spinner-border spinner-border-sm" role="status"></div>
    Lade Themen…
  </div>
  <div id="stats-bar" class="stats-bar"></div>
  <div id="topics-grid" class="row g-4"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
