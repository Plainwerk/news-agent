<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prisma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg:           #f8f9fa;
      --card-bg:      #ffffff;
      --headline:     #1a1a2e;
      --accent:       #e63946;
      --accent-blue:  #1a73e8;
      --muted:        #9ca3af;
      --border:       #e5e7eb;
      --faktenkern-bg:#e8f4f8;
      --faktenkern-bd:#1a73e8;
      --oerr:         #27ae60;
      --agentur:      #9ca3af;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      background-image: url('assets/top-view-old-french-newspaper-pieces.jpg');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      color: #111827;
      -webkit-font-smoothing: antialiased;
    }

    /* Semi-transparent overlay so content stays readable */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.82);
      z-index: 0;
      pointer-events: none;
    }

    /* Everything above the overlay */
    .site-nav, .container-xl { position: relative; z-index: 1; }

    /* ── Navbar ─────────────────────────────────────────────── */
    .site-nav {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 1px 8px rgba(0,0,0,.08);
      position: sticky;
      top: 0;
      z-index: 200;
      padding: 0.75rem 0;
    }
    .brand {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--headline);
      letter-spacing: -0.5px;
      text-decoration: none;
      white-space: nowrap;
    }
    .brand span { color: var(--accent); }

    .filter-pills { display: flex; gap: 0.375rem; flex-wrap: wrap; }
    .pill {
      padding: 0.3rem 0.875rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s ease;
      line-height: 1.4;
    }
    .pill:hover  { border-color: var(--headline); color: var(--headline); }
    .pill.active { background: var(--headline); color: #fff; border-color: var(--headline); }

    .date-select {
      font-size: 0.78rem;
      font-weight: 500;
      border-color: var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 0.3rem 0.75rem;
    }
    .date-select:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(26,115,232,.12); }

    /* ── Layout ─────────────────────────────────────────────── */
    .main-wrap { padding: 2rem 0 4rem; }
    .stats-bar { font-size: 0.78rem; color: var(--muted); margin-bottom: 1.25rem; }
    .spinner-wrap {
      display: flex; align-items: center; justify-content: center;
      padding: 5rem 0; color: var(--muted); font-size: 0.875rem; gap: 0.5rem;
    }
    #topics-grid { row-gap: 0.75rem; }

    /* ── Spectrum gradient bar ──────────────────────────────── */
    .spectrum-bar-wrap { padding: 4px 0; margin-bottom: 0.5rem; }

    .sgbar {
      background: linear-gradient(to right, #e63946, #f4a261, #8b5cf6, #1d3557);
      position: relative;
      overflow: visible;
    }
    .sgdot {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 1.5px rgba(0,0,0,.2), 0 1px 4px rgba(0,0,0,.25);
      pointer-events: none;
    }

    .spectrum-axis { display: flex; justify-content: space-between; margin-top: 5px; }
    .spectrum-axis-label { font-size: 0.62rem; font-weight: 500; color: var(--muted); }
    .spec-extras { display: flex; gap: 4px; align-items: center; }
    .spec-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .spec-dot-oerr    { background: var(--oerr); }
    .spec-dot-agentur { background: var(--agentur); }

    /* ── Spectrum badges (framing table) ────────────────────── */
    .spec-badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,.25);
      vertical-align: middle;
    }
    .spec-links        { background: #e63946; }
    .spec-mitte-links  { background: #f4845f; }
    .spec-mitte        { background: #adb5bd; color: #333; text-shadow: none; }
    .spec-mitte-rechts { background: #5b9bd5; }
    .spec-rechts       { background: #1d3557; }
    .spec-oerr         { background: #27ae60; }
    .spec-agentur      { background: #9ca3af; color: #333; text-shadow: none; }

    /* ── Hero ───────────────────────────────────────────────── */
    .hero-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 2rem 2.25rem;
      box-shadow: 0 2px 16px rgba(0,0,0,.07);
      border: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }
    .hero-eyebrow {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .hero-title {
      font-size: 2rem;
      font-weight: 800;
      color: var(--headline);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 1.25rem;
    }
    .hero-faktenkern {
      font-size: 0.95rem;
      line-height: 1.75;
      color: #374151;
      margin: 1rem 0 1.25rem;
      font-style: italic;
    }
    .hero-meta { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
    .btn-hero-detail {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--accent-blue);
      background: none;
      border: 1.5px solid var(--accent-blue);
      border-radius: 8px;
      padding: 0.45rem 1.1rem;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-hero-detail:hover { background: var(--accent-blue); color: #fff; }

    /* ── Cards ──────────────────────────────────────────────── */
    .topic-card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 16px;
      border: 1px solid var(--border);
      border-top-width: 3px;
      border-top-color: #d1d5db;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow .18s, transform .18s;
      position: relative;
    }
    .topic-card:hover {
      box-shadow: 0 8px 28px rgba(0,0,0,.1);
      transform: translateY(-2px);
    }

    /* Category accent colours */
    .cat-politik      { border-top-color: #3b82f6; background: rgba(240,247,255,0.92); }
    .cat-wirtschaft   { border-top-color: #10b981; background: rgba(240,253,244,0.92); }
    .cat-gesellschaft { border-top-color: #f59e0b; background: rgba(255,251,235,0.92); }

    .card-inner { padding: 0.875rem 1.25rem 0.625rem; position: relative; }

    .card-icon {
      position: absolute;
      top: 0.875rem;
      right: 1rem;
      font-size: 2.5rem;
      line-height: 1;
      opacity: 0.18;
      pointer-events: none;
      user-select: none;
    }

    .card-title-text {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--headline);
      line-height: 1.4;
      margin-bottom: 0.875rem;
      padding-right: 2.75rem;
    }
    .card-meta { font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem; }
    .has-framing { color: #059669; font-weight: 600; }

    .card-footer-hint {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent-blue);
      padding: 0.55rem 1.25rem;
      border-top: 1px solid var(--border);
    }

    /* ── Modal ──────────────────────────────────────────────── */
    .modal-content {
      border: none;
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,.18);
      overflow: hidden;
    }
    .modal-head {
      padding: 1.5rem 1.5rem 1.125rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 1.125rem;
      right: 1.125rem;
    }
    .modal-eyebrow {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .modal-topic-title {
      font-size: 1.45rem;
      font-weight: 800;
      color: var(--headline);
      line-height: 1.25;
      letter-spacing: -0.3px;
      margin-bottom: 0.375rem;
      padding-right: 2rem;
    }
    .modal-meta-line { font-size: 0.76rem; color: var(--muted); margin-bottom: 0.875rem; }

    /* ── Detail content ─────────────────────────────────────── */
    .modal-body { padding: 1.375rem 1.5rem 1.5rem; }

    .detail-section-label {
      font-size: 0.63rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .faktenkern-box {
      background: var(--faktenkern-bg);
      border-left: 3px solid var(--faktenkern-bd);
      padding: 0.875rem 1rem 0.875rem 1.1rem;
      border-radius: 0 8px 8px 0;
      font-size: 0.9rem;
      line-height: 1.75;
      color: #1f2937;
      margin-bottom: 1.25rem;
    }
    .framing-table {
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 1.25rem;
    }
    .framing-row { display: grid; grid-template-columns: 190px 1fr; }
    .framing-row:nth-child(even) { background: #f8f9fa; }
    .framing-row:nth-child(odd)  { background: #fff; }
    .framing-cell { padding: 0.6rem 0.875rem; font-size: 0.83rem; line-height: 1.5; }
    .framing-source {
      font-weight: 600;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 5px;
      flex-wrap: wrap;
    }
    .wort-konzept { font-size: 0.76rem; font-weight: 600; color: #374151; margin-top: 0.5rem; margin-bottom: 0.25rem; }
    .wort-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem 0.75rem; margin-bottom: 0.5rem; }
    .wort-item { font-size: 0.78rem; }
    .wort-source { font-weight: 600; color: #374151; }
    .wort-term { color: var(--muted); }
    .source-chips {
      display: flex; flex-wrap: wrap; gap: 0.375rem;
      margin-top: 1rem; padding-top: 0.875rem;
      border-top: 1px solid var(--border);
    }
    .source-chip {
      font-size: 0.71rem; font-weight: 500;
      padding: 0.25rem 0.625rem; border-radius: 20px;
      background: #f3f4f6; color: #374151;
      text-decoration: none; border: 1px solid var(--border);
      transition: background .12s;
    }
    .source-chip:hover { background: #e5e7eb; color: var(--headline); }
    .spinner-mini { font-size: 0.8rem; color: var(--muted); padding: 2rem 0; text-align: center; }

    /* ── Bias spectrum visualization ────────────────────────── */
    .bias-viz-wrap {
      position: relative;
      height: 210px;
      margin-bottom: 0.25rem;
    }
    .bias-gradient {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 12px;
      border-radius: 6px;
      background: linear-gradient(to right, #e63946, #f4a261, #8b5cf6, #1d3557);
      z-index: 0;
    }
    .bias-axis-labels {
      position: absolute;
      left: 0; right: 0;
      top: calc(50% + 12px);
      display: flex;
      justify-content: space-between;
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--muted);
      pointer-events: none;
    }
    .bias-card {
      position: absolute;
      transform: translateX(-50%);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 5px 8px;
      font-size: 0.68rem;
      width: 130px;
      cursor: default;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      transition: box-shadow .15s;
      z-index: 1;
    }
    .bias-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.15); z-index: 10; }
    .bias-card-r0 { bottom: calc(50% + 10px); } /* above bar */
    .bias-card-r1 { top:    calc(50% + 10px); } /* below bar */
    .bias-card-name {
      font-weight: 600;
      color: var(--headline);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 3px;
      font-size: 0.7rem;
    }
    .bias-card-framing {
      color: var(--muted);
      line-height: 1.35;
      margin-top: 2px;
      font-size: 0.65rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .controversy-line {
      font-size: 0.76rem;
      color: #374151;
      margin: 4px 0 1rem;
      font-weight: 500;
    }
    .controversy-line .sigma {
      font-size: 0.66rem;
      color: var(--muted);
      font-weight: 400;
    }
    .bias-mobile-list { display: none; }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 767px) {
      .bias-viz-wrap, .controversy-line { display: none; }
      .bias-mobile-list { display: block; }
    }

    @media (max-width: 576px) {
      .hero-title        { font-size: 1.4rem; }
      .hero-card         { padding: 1.25rem; }
      .modal-topic-title { font-size: 1.15rem; }
      .framing-row       { grid-template-columns: 1fr; }
      .framing-source    { border-right: none; border-bottom: 1px solid var(--border); }
      .wort-grid         { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <div class="container-xl">
    <div class="d-flex align-items-center gap-3 flex-wrap">
      <a class="brand" href="/"><img src="assets/prisma-logo.svg" alt="Prisma" style="height:32px;vertical-align:middle;margin-right:8px">Pris<span>ma</span></a>
      <div class="filter-pills">
        <button class="pill active" data-cat="Alle">Alle</button>
        <button class="pill" data-cat="Politik">Politik</button>
        <button class="pill" data-cat="Wirtschaft">Wirtschaft</button>
        <button class="pill" data-cat="Gesellschaft">Gesellschaft</button>
      </div>
      <div class="ms-auto">
        <select id="filter-date" class="date-select form-select">
          <option value="">Heute</option>
        </select>
      </div>
    </div>
  </div>
</nav>

<div class="container-xl main-wrap">
  <div id="hero-section" style="display:none"></div>
  <div id="spinner" class="spinner-wrap">
    <div class="spinner-border spinner-border-sm" role="status"></div>
    Lade Themen…
  </div>
  <div id="stats-bar" class="stats-bar"></div>
  <div id="topics-grid" class="row g-4"></div>
</div>

<!-- Framing Modal -->
<div class="modal fade" id="topic-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-head">
        <button type="button" class="btn-close modal-close"
                data-bs-dismiss="modal" aria-label="Schließen"></button>
        <div class="modal-eyebrow">Prisma · Framing-Analyse</div>
        <h2 class="modal-topic-title" id="modal-title">–</h2>
        <div class="modal-meta-line" id="modal-meta"></div>
        <div id="modal-spectrum"></div>
      </div>
      <div class="modal-body" id="modal-body">
        <div class="spinner-mini">Lädt…</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
