<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 70" width="80" height="70">
  <!-- Prism triangle -->
  <polygon points="40,4 74,62 6,62" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Incoming white light beam (left side) -->
  <line x1="4" y1="36" x2="26" y2="36" stroke="white" stroke-width="2" opacity="0.9"/>

  <!-- Spectrum rays fanning out from right side of prism -->
  <!-- Red -->
  <line x1="54" y1="44" x2="78" y2="32" stroke="#e63946" stroke-width="2" stroke-linecap="round"/>
  <!-- Orange -->
  <line x1="54" y1="44" x2="78" y2="38" stroke="#f4a261" stroke-width="2" stroke-linecap="round"/>
  <!-- Yellow -->
  <line x1="54" y1="44" x2="78" y2="44" stroke="#f9c74f" stroke-width="2" stroke-linecap="round"/>
  <!-- Green -->
  <line x1="54" y1="44" x2="78" y2="50" stroke="#43aa8b" stroke-width="2" stroke-linecap="round"/>
  <!-- Blue -->
  <line x1="54" y1="44" x2="78" y2="56" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
  <!-- Violet -->
  <line x1="54" y1="44" x2="78" y2="62" stroke="#7b2d8b" stroke-width="2" stroke-linecap="round"/>
</svg>
